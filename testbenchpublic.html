<!DOCTYPE html>
<html>
<head>

<title>posi0nSword</title>
<style>
  :root { --green: #3d9459; --hairline: rgba(60,60,67,.29); }
  html, body { margin:0; padding:0; height:100%; background:#f2f2f7; overscroll-behavior:none; }
  body { -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%;
         font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Roboto, sans-serif; }
  a { color:var(--green); text-decoration:none; }
  @keyframes f7fade { from { opacity:0; } to { opacity:1; } }
  @keyframes f7spin { to { transform:rotate(360deg); } }
  .app { position:relative; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

  /* ---- top navbar ---- */
  .navbar { flex:none; position:relative; z-index:20; background:rgba(249,249,250,.9);
            backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
            box-shadow:0 .5px 0 var(--hairline); padding-top:env(safe-area-inset-top); }
  .navbar .row { height:46px; display:flex; align-items:center; justify-content:space-between; padding:0 6px; position:relative; }
  .navbtn { color:var(--green); font-size:17px; padding:0 12px; height:44px; display:flex; align-items:center;
            background:none; border:none; cursor:pointer; user-select:none; }
  .navbtn:active { opacity:.4; }
  .navtitle { position:absolute; left:50%; transform:translateX(-50%); font-size:17px; font-weight:600; letter-spacing:-.02em; color:#000; }

  /* ---- log console ---- */
  #output-list { flex:1; overflow-y:auto; background:#191b1f; padding:12px 0; box-sizing:border-box;
                 font-family:ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
                 font-size:13px; line-height:1.65; color:#ced2d9; overscroll-behavior:contain; }
  #output-list > div { padding:2px 16px; white-space:pre-wrap; word-break:break-word; }
  #output-list .fail { color:#d98d84; }
  #output-list .warn { color:#d8b573; }
  #output-list::-webkit-scrollbar { width:8px; }
  #output-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:4px; }

  /* ---- bottom toolbar ---- */
  .toolbar { flex:none; z-index:20; background:rgba(249,249,250,.9);
             backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
             box-shadow:0 -.5px 0 var(--hairline); padding-bottom:env(safe-area-inset-bottom); }
  .toolbar .row { height:50px; display:flex; align-items:center; max-width:560px; margin:0 auto; padding:0 6px; }
  .toolbar .side { flex:1; display:flex; align-items:center; }
  .toolbar .side.right { justify-content:flex-end; }
  .iconbtn { width:44px; height:44px; display:flex; align-items:center; justify-content:center;
             background:none; border:none; cursor:pointer; user-select:none; padding:0; }
  .iconbtn:active { opacity:.4; }
  .iconbtn[disabled] { opacity:.35; pointer-events:none; }
  .iconbtn svg { fill:var(--green); }
  .center { flex:none; min-width:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
  #statuswrap { display:flex; align-items:center; gap:5px; font-size:12.5px; font-weight:600; color:#1c1c1e; line-height:1; }
  #spin { width:12px; height:12px; display:none; }
  #spin.on { display:block; animation:f7spin .8s steps(8,end) infinite; }

  /* ---- modal (about/credits) ---- */
  .overlay { position:fixed; inset:0; z-index:100; display:none; align-items:flex-end; justify-content:center;
             background:rgba(0,0,0,.25); animation:f7fade .25s; }
  .overlay[data-open="true"] { display:flex; }
  .modal { background:#f2f2f7; border-radius:14px 14px 0 0; width:min(560px,100%); max-height:70%;
           overflow-y:auto; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); box-sizing:border-box; }
  .modal h2 { font-size:20px; margin:0 0 10px; color:#000; }
  .modal p { font-size:15px; line-height:1.55; color:#3c3c43; margin:0 0 10px; }
  .modal .muted { color:#8e8e93; font-size:13px; }
  .modal .row { display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:.5px solid var(--hairline); font-size:14.5px; color:#1c1c1e; }
  .modal .row .v { color:#8e8e93; text-align:right; }
  .modal .close { display:block; margin:12px auto 0; padding:9px 26px; border:none; border-radius:11px;
                  background:#fff; color:var(--green); font-size:16px; font-weight:600; cursor:pointer; }

  /* ---- settings sheet ---- */
  #sheetBackdrop { position:fixed; inset:0; z-index:240; background:rgba(0,0,0,.25); display:none; animation:f7fade .3s; }
  #sheetBackdrop.on { display:block; }
  #settingsSheet { position:fixed; left:0; right:0; bottom:0; z-index:250; transform:translateY(105%);
                   transition:transform .34s cubic-bezier(.32,.72,0,1); pointer-events:none; }
  #settingsSheet.on { transform:translateY(0); }
  #settingsSheet .card { max-width:560px; margin:0 auto; background:#f2f2f7; border-radius:14px 14px 0 0;
                         pointer-events:auto; padding-bottom:calc(10px + env(safe-area-inset-bottom,0px)); }
  #settingsSheet .grab { width:36px; height:5px; border-radius:3px; background:rgba(60,60,67,.3); margin:8px auto 0; }
  #settingsSheet .head { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 6px; }
  #settingsSheet .head b { font-size:20px; color:#000; }
  #settingsSheet .done { color:var(--green); font-size:17px; font-weight:600; padding:6px 4px; cursor:pointer; background:none; border:none; }
  #settingsSheet .group { background:#fff; border-radius:12px; overflow:hidden; margin:6px 16px 0; }
  .togglerow { display:flex; align-items:center; gap:12px; padding:10px 16px; cursor:pointer; user-select:none; }
  .togglerow + .togglerow { border-top:.5px solid var(--hairline); }
  .togglerow .txt { flex:1; min-width:0; }
  .togglerow .txt b { display:block; font-size:17px; font-weight:400; color:#000; }
  .togglerow .txt span { font-size:13px; color:rgba(60,60,67,.6); }
  .tswitch { width:51px; height:31px; border-radius:16px; flex:none; background:#e9e9ea; transition:background .25s; position:relative; }
  .tswitch.on { background:var(--green); }
  .tswitch i { position:absolute; top:2px; left:2px; width:27px; height:27px; border-radius:50%; background:#fff;
               box-shadow:0 3px 8px rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.12); transition:transform .25s cubic-bezier(.25,.8,.4,1.15); }
  .tswitch.on i { transform:translateX(20px); }
</style>

<script>
// UI layer: toggles + sheet + status spinner (independent of the harness below)
(function () {
    const defs = { f7Timestamps: true, f7AutoScroll: true, f7Verbose: true };
    try {
        const saved = JSON.parse(localStorage.getItem("f7ui") || "{}");
        for (const k in defs) window[k] = (k in saved) ? !!saved[k] : defs[k];
    } catch (_) { for (const k in defs) window[k] = defs[k]; }
    function persist() { try { localStorage.setItem("f7ui", JSON.stringify({ f7Timestamps: window.f7Timestamps, f7AutoScroll: window.f7AutoScroll, f7Verbose: window.f7Verbose })); } catch (_) { } }
    const sw = { f7Timestamps: "swTs", f7AutoScroll: "swAs", f7Verbose: "swVb" };
    for (const k in sw) document.getElementById(sw[k]).classList.toggle("on", !!window[k]);
    document.querySelectorAll(".togglerow").forEach(row => {
        row.addEventListener("click", () => {
            const k = row.dataset.k;
            window[k] = !window[k];
            document.getElementById(sw[k]).classList.toggle("on", !!window[k]);
            persist();
        });
    });
    const sheet = document.getElementById("settingsSheet"), bd = document.getElementById("sheetBackdrop");
    const openSheet = () => { sheet.classList.add("on"); bd.classList.add("on"); };
    const closeSheet = () => { sheet.classList.remove("on"); bd.classList.remove("on"); };
    document.getElementById("settingsBtn").addEventListener("click", openSheet);
    document.getElementById("settingsDone").addEventListener("click", closeSheet);
    bd.addEventListener("click", closeSheet);
    document.getElementById("clearBtn").addEventListener("click", () => {
        document.getElementById("output-list").textContent = "";
    });
    // status spinner: on while the status text mentions running
    const spin = document.getElementById("spin");
    new MutationObserver(() => {
        const s = document.getElementById("status").textContent.toLowerCase();
        spin.classList.toggle("on", /running|loading|spawning|stage|wake|spin/.test(s));
    }).observe(document.getElementById("status"), { childList: true, characterData: true, subtree: true });
})();
</script>

                if (e.key === "Escape") closeModal();
                if (e.key === "Enter" && overlay.dataset.open === "true") closeModal();
            });
            log('Press "run" to start, only iOS 26.1 is tested. Offsets are for the iPhone 15 plus only currently, and work on vphone.');

        });
    </script>
</body>
</html>
